version: '3.8'

services:
  app:
    build: .
    env_file: .env
    ports:
      - "${SERVER_PORT:-3000}:3000"
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy
      chroma:
        condition: service_started
    restart: unless-stopped

  ui:
    build:
      context: ./packages/ui
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "${UI_PORT:-5173}:5173"
    depends_on:
      - app
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

volumes:
  chroma_data:
